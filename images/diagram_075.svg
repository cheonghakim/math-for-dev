<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200" style="background-color: #ffffff;">
  <!-- Background -->
  <rect width="400" height="200" fill="#ffffff" />
  
  <!-- Title -->
  <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">LERP (선형 보간) 시각화</text>
  
  <!-- Line from A to B -->
  <line x1="60" y1="110" x2="340" y2="110" stroke="#94a3b8" stroke-width="3" stroke-dasharray="4 4" />
  <line x1="60" y1="110" x2="200" y2="110" stroke="#3b82f6" stroke-width="4" />
  
  <!-- Point A -->
  <circle cx="60" cy="110" r="6" fill="#0f172a" />
  <text x="60" y="90" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#0f172a">A (t=0)</text>
  <text x="60" y="135" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#64748b">시작 위치</text>
  
  <!-- Point B -->
  <circle cx="340" cy="110" r="6" fill="#0f172a" />
  <text x="340" y="90" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#0f172a">B (t=1)</text>
  <text x="340" y="135" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#64748b">종료 위치</text>
  
  <!-- Interpolated Point P -->
  <circle cx="200" cy="110" r="8" fill="#f97316" stroke="#ffffff" stroke-width="2" />
  <text x="200" y="80" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#f97316">P (t = 0.5)</text>
  <text x="200" y="135" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#f97316">P = A + (B - A) * 0.5</text>
  
  <!-- Formula Helper -->
  <path d="M 60 155 L 200 155" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="130" y="172" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#3b82f6">거리 비례 이동 (50%)</text>
</svg>
