<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 350" width="100%" height="100%">
  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#10b981" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#d97706" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="8" />
  <rect width="100%" height="100%" fill="none" stroke="#e2e8f0" stroke-width="1" rx="8" />

  <text x="25" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">충돌 지점에서의 접촉 속도 (Contact Velocity)</text>
  <text x="25" y="48" font-family="sans-serif" font-size="11" fill="#64748b">물체의 선속도(v)와 회전으로 인한 각속도(ω)가 결합되어 충돌 지점의 최종 속도를 결정합니다.</text>

  <!-- Grid and graphics center shifted from 180 to 150 for more right-side margin -->
  <g transform="translate(150, 190)">
    <!-- Rigid Body (Rotated box or oval) -->
    <ellipse cx="0" cy="0" rx="110" ry="70" transform="rotate(-15)" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />

    <!-- Center of mass -->
    <circle cx="0" cy="0" r="5" fill="#3b82f6" />
    <text x="-15" y="-12" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="end">무게 중심 (COM)</text>
    
    <!-- Linear velocity vector v -->
    <line x1="0" y1="0" x2="70" y2="-40" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)" />
    <!-- Positioned below the vector line to avoid overlap with angular velocity label -->
    <text x="40" y="-12" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2563eb">선속도 v</text>

    <!-- Angular velocity indicator loop -->
    <path d="M -30,-45 A 55,55 0 0,1 45,-30" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-green)" />
    <text x="5" y="-60" font-family="sans-serif" font-size="12" font-weight="bold" fill="#059669">각속도 ω (회전)</text>

    <!-- Contact Point vector r (Center -> P) -->
    <line x1="0" y1="0" x2="90" y2="45" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 3" />
    <!-- Positioned closer to origin to avoid overlapping with collision point P and its label -->
    <text x="30" y="10" font-family="sans-serif" font-size="11" fill="#64748b" font-weight="bold">r (위치 벡터)</text>

    <!-- Contact Point Node P -->
    <circle cx="90" cy="45" r="5" fill="#0f172a" />
    <text x="90" y="62" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">충돌점 P</text>

    <!-- Rotational velocity vector at P (ω × r) -> perpendicular to r -->
    <line x1="90" y1="45" x2="55" y2="115" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)" />
    <text x="45" y="125" font-family="sans-serif" font-size="12" font-weight="bold" fill="#059669" text-anchor="end">회전 속도 (ω × r)</text>

    <!-- Linear velocity vector component at P (parallel to v) -->
    <line x1="90" y1="45" x2="160" y2="5" fill="none" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow-blue)" />
    <!-- text-anchor="end" prevents the label from expanding rightwards under the formula box -->
    <text x="155" y="0" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2563eb" text-anchor="end">선속도 성분 v</text>

    <!-- Total Velocity vector at P (v_p) -->
    <line x1="90" y1="45" x2="125" y2="75" fill="none" stroke="#d97706" stroke-width="3" marker-end="url(#arrow-orange)" />
    <text x="135" y="85" font-family="sans-serif" font-size="12" font-weight="bold" fill="#d97706" text-anchor="start">최종 접촉 속도 v_p</text>
    
    <!-- Parallelogram helper lines -->
    <line x1="160" y1="5" x2="125" y2="75" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="55" y1="115" x2="125" y2="75" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2 2" />
  </g>

  <!-- Formula box -->
  <rect x="360" y="80" width="165" height="130" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4" />
  <text x="375" y="105" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">접촉 속도 공식:</text>
  <text x="375" y="130" font-family="monospace" font-size="13" font-weight="bold" fill="#0f172a">v_p = v + ω × r</text>
  <line x1="375" y1="145" x2="510" y2="145" stroke="#e2e8f0" />
  <text x="375" y="165" font-family="sans-serif" font-size="11" fill="#64748b">v : 선속도 (직선)</text>
  <text x="375" y="180" font-family="sans-serif" font-size="11" fill="#64748b">ω × r : 각속도가</text>
  <text x="375" y="195" font-family="sans-serif" font-size="11" fill="#64748b"> 만드는 접선 속도</text>
</svg>
