<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220" style="background-color: #ffffff;">
  <!-- Background -->
  <rect width="400" height="220" fill="#ffffff" />
  
  <!-- Title -->
  <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">3차 베지에 곡선 (Cubic Bézier Curve)</text>
  
  <!-- Control Polygon Lines -->
  <line x1="60" y1="160" x2="120" y2="50" stroke="#cbd5e1" stroke-width="1.5" />
  <line x1="120" y1="50" x2="280" y2="50" stroke="#cbd5e1" stroke-width="1.5" />
  <line x1="280" y1="50" x2="340" y2="160" stroke="#cbd5e1" stroke-width="1.5" />
  
  <!-- Bézier Curve Path -->
  <!-- Path uses cubic bezier command: M start_x start_y C cp1_x cp1_y cp2_x cp2_y end_x end_y -->
  <path d="M 60 160 C 120 50, 280 50, 340 160" fill="none" stroke="#f97316" stroke-width="3" />
  
  <!-- Control Points (Handles) -->
  <circle cx="60" cy="160" r="5" fill="#0f172a" />
  <text x="45" y="165" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">P0 (시작)</text>
  
  <circle cx="120" cy="50" r="4" fill="#3b82f6" />
  <text x="120" y="35" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#3b82f6">P1 (제어점)</text>
  
  <circle cx="280" cy="50" r="4" fill="#3b82f6" />
  <text x="280" y="35" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#3b82f6">P2 (제어점)</text>
  
  <circle cx="340" cy="160" r="5" fill="#0f172a" />
  <text x="355" y="165" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">P3 (종료)</text>
  
  <!-- Math Formula Helper -->
  <text x="200" y="200" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#64748b">t ∈ [0, 1] 에 따라 P0에서 P3으로 부드럽게 연결</text>
</svg>
