<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 380" width="100%" height="100%">
  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="8" />
  <rect width="100%" height="100%" fill="none" stroke="#e2e8f0" stroke-width="1" rx="8" />

  <text x="25" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">2D 회전 공식의 삼각함수 유도</text>
  <text x="25" y="48" font-family="sans-serif" font-size="11" fill="#64748b">극좌표와 삼각함수의 덧셈정리를 이용한 공식 유도 과정</text>

  <!-- Coordinates origin at (100, 280) -->
  <g transform="translate(100, 280)">
    <!-- Axes -->
    <line x1="-20" y1="0" x2="380" y2="0" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)" />
    <line x1="0" y1="20" x2="0" y2="-240" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-gray)" />
    <text x="365" y="15" font-family="sans-serif" font-size="11" fill="#64748b">x</text>
    <text x="10" y="-225" font-family="sans-serif" font-size="11" fill="#64748b">y</text>

    <!-- Radius Circle (radius = 240) -->
    <path d="M 240,0 A 240,240 0 0,0 62,-231" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4" />

    <!-- Original Point P(x, y) at angle alpha = 25 degrees -->
    <line x1="0" y1="0" x2="213" y2="-99" fill="none" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow-blue)" />
    <circle cx="217.5" cy="-101.4" r="6" fill="#3b82f6" />
    <text x="225" y="-105" font-family="sans-serif" font-size="12" font-weight="bold" fill="#3b82f6">P (x, y)</text>
    <text x="225" y="-90" font-family="sans-serif" font-size="11" fill="#64748b">x = r·cos α, y = r·sin α</text>

    <!-- Dotted lines for P(x, y) coordinates -->
    <line x1="217.5" y1="0" x2="217.5" y2="-101.4" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="0" y1="-101.4" x2="217.5" y2="-101.4" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 2" />

    <!-- Rotated Point P'(x', y') by angle theta = 35 degrees (Total angle = 60 degrees) -->
    <line x1="0" y1="0" x2="117" y2="-203" fill="none" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" />
    <circle cx="120" cy="-207.8" r="6" fill="#ef4444" />
    <text x="125" y="-218" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ef4444">P' (x', y')</text>
    <text x="125" y="-203" font-family="sans-serif" font-size="11" fill="#64748b">x' = r·cos(α + θ)</text>
    <text x="125" y="-188" font-family="sans-serif" font-size="11" fill="#64748b">y' = r·sin(α + θ)</text>

    <!-- Dotted lines for P'(x', y') coordinates -->
    <line x1="120" y1="0" x2="120" y2="-207.8" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 2" />
    <line x1="0" y1="-207.8" x2="120" y2="-207.8" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2 2" />

    <!-- Arc for alpha (25 degrees, radius 80) -->
    <path d="M 80,0 A 80,80 0 0,0 72.5,-33.8" fill="none" stroke="#3b82f6" stroke-width="1.5" />
    <text x="85" y="-12" font-family="sans-serif" font-size="11" fill="#3b82f6">α</text>

    <!-- Arc for theta (35 degrees, from alpha=25 to alpha+theta=60, radius 120) -->
    <path d="M 108.8,-50.7 A 120,120 0 0,0 60,-103.9" fill="none" stroke="#f59e0b" stroke-width="2" />
    <text x="100" y="-80" font-family="sans-serif" font-size="11" fill="#d97706">θ</text>
  </g>

  <!-- Derivation text next to drawing -->
  <g transform="translate(370, 75)">
    <rect width="160" height="270" fill="#f8fafc" stroke="#e2e8f0" rx="4" />
    <text x="15" y="25" font-family="sans-serif" font-size="12" font-weight="bold" fill="#0f172a">덧셈 정리 유도:</text>
    
    <text x="15" y="52" font-family="monospace" font-size="10.5" font-weight="bold" fill="#0f172a">cos(α + θ)</text>
    <text x="15" y="67" font-family="monospace" font-size="10.5" fill="#0f172a">= cos α cos θ</text>
    <text x="15" y="82" font-family="monospace" font-size="10.5" fill="#0f172a">  - sin α sin θ</text>
    
    <text x="15" y="105" font-family="monospace" font-size="10.5" font-weight="bold" fill="#0f172a">sin(α + θ)</text>
    <text x="15" y="120" font-family="monospace" font-size="10.5" fill="#0f172a">= sin α cos θ</text>
    <text x="15" y="135" font-family="monospace" font-size="10.5" fill="#0f172a">  + cos α sin θ</text>
    
    <line x1="15" y1="148" x2="145" y2="148" stroke="#cbd5e1" />
    
    <text x="15" y="168" font-family="monospace" font-size="10.5" font-weight="bold" fill="#0f172a">x' = r·cos(α + θ)</text>
    <text x="15" y="183" font-family="monospace" font-size="10.5" fill="#0f172a">   = x·cos θ</text>
    <text x="15" y="198" font-family="monospace" font-size="10.5" fill="#0f172a">     - y·sin θ</text>
    
    <text x="15" y="220" font-family="monospace" font-size="10.5" font-weight="bold" fill="#0f172a">y' = r·sin(α + θ)</text>
    <text x="15" y="235" font-family="monospace" font-size="10.5" fill="#0f172a">   = x·sin θ</text>
    <text x="15" y="250" font-family="monospace" font-size="10.5" fill="#0f172a">     + y·cos θ</text>
  </g>
</svg>
