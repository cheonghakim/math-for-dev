<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="100%" height="100%">
  <!-- Markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" rx="8" />
  <rect width="100%" height="100%" fill="none" stroke="#e2e8f0" stroke-width="1" rx="8" />

  <text x="25" y="30" font-family="sans-serif" font-size="15" font-weight="bold" fill="#0f172a">atan2로 방향 벡터의 각도 구하기</text>
  <text x="25" y="48" font-family="sans-serif" font-size="11" fill="#64748b">x축 기준선(0°)으로부터 목표점까지의 회전 각도 θ 계산</text>

  <!-- Center of coordinates (Player position) at (120, 220) -->
  <g transform="translate(120, 220)">
    <!-- x-axis baseline (0 degrees reference) -->
    <line x1="0" y1="0" x2="300" y2="0" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-gray)" />
    <text x="305" y="4" font-family="sans-serif" font-size="11" fill="#64748b">기준선 (0°, Positive X-axis)</text>

    <!-- Mouse / Target position at (240, -140) -->
    <line x1="0" y1="0" x2="240" y2="0" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" />
    <line x1="240" y1="0" x2="240" y2="-140" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" />
    
    <!-- Labels for triangle sides -->
    <text x="120" y="16" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">dx = mouse.x - player.x (밑변)</text>
    <text x="250" y="-70" font-family="sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="start">dy = mouse.y - player.y (높이)</text>

    <!-- Vector to Target (Hypotenuse) -->
    <line x1="0" y1="0" x2="232" y2="-135" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)" />
    <text x="95" y="-85" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2563eb" transform="rotate(-30, 95, -85)">상대 벡터</text>

    <!-- Arc for Angle theta -->
    <path d="M 70 0 A 70 70 0 0 0 60.5 -35.2" fill="none" stroke="#f59e0b" stroke-width="2.5" />
    <text x="80" y="-18" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f59e0b">θ</text>

    <!-- Right angle indicator -->
    <rect x="230" y="-10" width="10" height="10" fill="none" stroke="#94a3b8" />

    <!-- Nodes -->
    <circle cx="0" cy="0" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2" />
    <text x="-15" y="-18" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="end">Player (시작점)</text>

    <circle cx="240" cy="-140" r="8" fill="#ec4899" stroke="#db2777" stroke-width="2" />
    <text x="250" y="-142" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Mouse (목표점)</text>
  </g>

  <!-- Explanation box -->
  <rect x="25" y="305" width="550" height="50" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4" />
  <text x="35" y="325" font-family="monospace" font-size="13" font-weight="bold" fill="#0f172a">const angle = Math.atan2(dy, dx);</text>
  <text x="35" y="343" font-family="sans-serif" font-size="11" fill="#64748b">dy(y축 변화량)와 dx(x축 변화량)의 비율을 통해 -180° ~ 180° 전방위 각도를 안전하게 구합니다.</text>
</svg>
