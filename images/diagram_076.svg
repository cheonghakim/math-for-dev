<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220" style="background-color: #ffffff;">
  <!-- Background -->
  <rect width="420" height="220" fill="#ffffff" />
  
  <!-- Title -->
  <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0f172a">레이캐스팅 (Ray-vs-Circle) 시각화</text>
  
  <!-- Circle -->
  <circle cx="280" cy="110" r="50" fill="none" stroke="#64748b" stroke-width="2" />
  <circle cx="280" cy="110" r="3" fill="#0f172a" />
  <text x="280" y="95" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#0f172a">Center (C)</text>
  
  <!-- Ray Origin -->
  <circle cx="50" cy="150" r="5" fill="#3b82f6" />
  <text x="50" y="175" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6">Origin (O)</text>
  
  <!-- Ray Direction Line -->
  <line x1="50" y1="150" x2="380" y2="67.5" stroke="#3b82f6" stroke-width="2" />
  <!-- Arrow head -->
  <polygon points="375,64 385,66 377,72" fill="#3b82f6" />
  <text x="110" y="125" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6">Dir (D)</text>
  
  <!-- Intersection Points -->
  <!-- Intersection 1: approximately (234.3, 113.9) -->
  <circle cx="234.3" cy="103.9" r="6" fill="#f97316" stroke="#ffffff" stroke-width="2" />
  <text x="225" y="85" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" text-anchor="end" fill="#f97316">t1 (첫 충돌)</text>
  
  <!-- Intersection 2: approximately (320, 82.5) -->
  <circle cx="321.7" cy="82.1" r="5" fill="#e2e8f0" stroke="#f97316" stroke-width="2" />
  <text x="335" y="70" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">t2 (두번째 충돌)</text>
  
  <!-- Math Formula Helper -->
  <text x="20" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">광선 상의 점 P(t) = O + D * t</text>
  <text x="250" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">원 조건: |P(t) - C|² = R²</text>
</svg>
